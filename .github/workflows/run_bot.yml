name: Run Empire Bot Daily

on:
  schedule:
    - cron: '15 4 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write   # required so the job can commit the universe cache back

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 250   # keep this above MAX_RUNTIME_MINUTES (default 240) in main.py

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Screener and Telegram Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
        SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python main.py

    - name: Persist NSE universe cache
      # Commits the refreshed cache file back to the repo so the next run
      # has a fallback even if NSE blocks the live fetch that day.
      run: |
        if [ -f "nse_universe_cache.csv" ]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nse_universe_cache.csv
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh NSE universe cache [skip ci]"
            git push
          else
            echo "No changes to universe cache; skipping commit."
          fi
        else
          echo "No cache file found to persist."
        fi